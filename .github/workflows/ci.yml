name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:15
        env:
          POSTGRES_USER: ${{ secrets.DB_USER }}
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
          POSTGRES_DB: ${{ secrets.DB_NAME }}
        ports:
          - 5432:5432

    env:
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_HOST: db       # matches service key
      DB_PORT: 5432
      DB_NAME: ${{ secrets.DB_NAME }}

    steps:
      # 1️⃣ Checkout code
      - uses: actions/checkout@v3

      # 2️⃣ Setup Python
      - uses: actions/setup-python@v4
        with:
          python-version: 3.11

      # 3️⃣ Install dependencies
      - run: pip install -r requirements.txt && pip install psycopg2-binary

      # 4️⃣ Wait for Postgres and test connection
      - name: Wait for Postgres and test DB connection
        run: |
          for i in {1..15}; do
            if pg_isready -h db -p 5432 -U ${{ env.DB_USER }}; then
              echo "✅ DB is ready"
              exit 0
            fi
            echo "⏳ Waiting for DB... ($i/15)"
            sleep 2
          done
          echo "❌ DB failed to start"
          exit 1
        env:
          PGPASSWORD: ${{ env.DB_PASSWORD }}

      # 5️⃣ Run your app
      - run: python app/main.py