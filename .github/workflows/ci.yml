name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:15
        env:
          POSTGRES_USER: ${{ secrets.DB_USER }}
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
          POSTGRES_DB: ${{ secrets.DB_NAME }}
        ports:
          - 5432:5432

    env:
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${{ secrets.DB_NAME }}

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install psycopg2-binary

      - name: Debug container state
        run: |
          echo "=== docker ps -a ==="
          docker ps -a
          echo "=== docker logs for postgres service ==="
          docker logs $(docker ps -q --filter ancestor=postgres:15 || true)

      - name: Wait for Postgres service
        run: |
          for i in $(seq 1 30); do
            echo "⏳ postgres waiting ($i/30)"
            if PGPASSWORD="$DB_PASSWORD" psql -h "$DB_HOST" -U "$DB_USER" -d "$DB_NAME" -c '\q' >/dev/null 2>&1; then
              echo "✅ postgres ready"
              break
            fi
            sleep 2
          done
          if ! PGPASSWORD="$DB_PASSWORD" psql -h "$DB_HOST" -U "$DB_USER" -d "$DB_NAME" -c '\q' >/dev/null 2>&1; then
            echo "❌ postgres never became ready"
            docker ps -a
            docker logs $(docker ps -q --filter ancestor=postgres:15 || true)
            exit 1
          fi

      - name: Run pipeline
        run: python app/main.py