name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: ${{ secrets.DB_USER }}
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
          POSTGRES_DB: ${{ secrets.DB_NAME }}
        ports:
          - 5432:5432

    env:
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${{ secrets.DB_NAME }}

    steps:
      # 1️⃣ Checkout code
      - uses: actions/checkout@v3

      # 2️⃣ Setup Python
      - uses: actions/setup-python@v4
        with:
          python-version: 3.11

      # 3️⃣ Install dependencies
      - run: pip install -r requirements.txt

      # 4️⃣ Wait for Postgres to be ready
      - name: Wait for Postgres
        run: |
          for i in {1..15}; do
            pg_isready -h $DB_HOST -p $DB_PORT -U $DB_USER && break
            echo "Waiting for Postgres..."
            sleep 2
          done
        env:
          DB_HOST: ${{ env.DB_HOST }}
          DB_PORT: ${{ env.DB_PORT }}
          DB_USER: ${{ env.DB_USER }}

      # 5️⃣ Optional: Test DB connection
      - name: Test DB connection
        run: |
          python -c "import psycopg2, os; psycopg2.connect(user=os.environ['DB_USER'], password=os.environ['DB_PASSWORD'], host=os.environ['DB_HOST'], port=os.environ['DB_PORT'], dbname=os.environ['DB_NAME']); print('DB connection successful')"

      # 6️⃣ Run your app
      - run: python app/main.py