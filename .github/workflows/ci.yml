name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Repository checkout
      - uses: actions/checkout@v3

      # 2️⃣ Create .env file with secrets
      - name: Create .env file
        run: |
          echo "DB_USER=${{ secrets.DB_USER }}" > .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
          echo "DB_HOST=db" >> .env
          echo "DB_PORT=5432" >> .env
          echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env
          cat .env

      # 3️⃣ Start Docker Compose (application + database)
      - name: Start services with Docker Compose
        run: |
          export DB_USER="${{ secrets.DB_USER }}"
          export DB_PASSWORD="${{ secrets.DB_PASSWORD }}"
          export DB_NAME="${{ secrets.DB_NAME }}"
          docker compose up -d
          sleep 5
          docker compose logs db

      # 4️⃣ Wait for Postgres to be ready
      - name: Wait for Postgres to be ready
        run: |
          for i in $(seq 1 30); do
            echo "⏳ waiting for postgres ($i/30)"
            if docker exec $(docker ps -q --filter "name=db") pg_isready -U "${{ secrets.DB_USER }}" >/dev/null 2>&1; then
              echo "✅ postgres is ready"
              exit 0
            fi 
            sleep 2
          done
          echo "❌ postgres never became ready"
          docker compose logs db
          exit 1

      # 5️⃣ Install Python packages
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 6️⃣ Run pipeline
      - name: Run pipeline
        run: python app/main.py

      # 7️⃣ Cleanup containers
      - name: Cleanup
        if: always()
        run: docker compose down