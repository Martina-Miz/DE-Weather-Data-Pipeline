name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  test-db:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: weather
        ports:
          - 5432:5432

    steps:
      - name: Check containers
        run: docker ps

      - name: Wait for DB
        run: sleep 10

      - name: Test connection
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          pg_isready -h localhost -p 5432