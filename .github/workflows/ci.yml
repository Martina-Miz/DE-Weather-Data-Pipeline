name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Repository checkout
      - uses: actions/checkout@v3

      # 2️⃣ Create .env file with secrets
      - name: Create .env file
        run: |
          cat > .env << EOF
          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_HOST=db
          DB_PORT=5432
          DB_NAME=${{ secrets.DB_NAME }}
          EOF

      # 3️⃣ Start Docker Compose (application + database)
      - name: Start services with Docker Compose
        run: docker compose up -d

      # 4️⃣ Wait for Postgres to be ready
      - name: Wait for Postgres to be ready
        run: |
          for i in $(seq 1 30); do
            echo "⏳ waiting for postgres ($i/30)"
            if docker exec $(docker ps -q --filter "name=db") pg_isready -U "${{ secrets.DB_USER }}" >/dev/null 2>&1; then
              echo "✅ postgres is ready"
              exit 0
            fi 
            sleep 2
          done
          echo "❌ postgres never became ready"
          docker compose logs db
          exit 1

      # 5️⃣ Install Python packages
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 6️⃣ Run pipeline
      - name: Run pipeline
        run: python app/main.py

      # 7️⃣ Cleanup containers
      - name: Cleanup
        if: always()
        run: docker compose down